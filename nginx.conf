user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        application/font-woff
        application/font-woff2
        font/woff2
        font/woff;
    gzip_vary on;

    # Rate limiting — 30 requests/min per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    limit_req_status 429;

    # Block known AI scraper bots by User-Agent
    map $http_user_agent $bad_bot {
        default           0;
        ~*GPTBot          1;
        ~*OAI-SearchBot   1;
        ~*ChatGPT-User    1;
        ~*ClaudeBot       1;
        ~*anthropic-ai    1;
        ~*CCBot           1;
        ~*Bytespider      1;
    }

    # Server block for chatbot demo (chatbot.4-eyes.eu)
    server {
        listen       [::]:8080;
        server_name  chatbot.4-eyes.eu;

        root   /usr/share/nginx/html;
        index  index.html;

        if ($bad_bot) { return 403; }
        limit_req zone=general burst=20 nodelay;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Server block for workshop site (www.4-eyes.eu)
    server {
        listen       [::]:8080;
        server_name  www.4-eyes.eu;

        root   /usr/share/nginx/workshops;
        index  index.html;

        if ($bad_bot) { return 403; }
        limit_req zone=general burst=20 nodelay;

        location / {
            try_files $uri $uri.html $uri/ =404;
        }
    }

    # Server block for fleet dashboard (dashboard.4-eyes.eu)
    server {
        listen       [::]:8080 default_server ipv6only=off;
        server_name  dashboard.4-eyes.eu;

        root   /usr/share/nginx/dashboard;
        index  index.html;

        if ($bad_bot) { return 403; }
        limit_req zone=general burst=20 nodelay;

        # No caching for dashboard
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # robots.txt — no caching
        location = /robots.txt {
            try_files $uri =404;
            add_header Cache-Control "no-cache";
        }

        # Serve ScienceBusiness tracker
        location = /sciencebusiness.html {
            try_files $uri =404;
        }

        # Serve main dashboard page
        location / {
            try_files $uri $uri/ /index.html =404;
        }
    }
}