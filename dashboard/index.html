<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="refresh" content="300">
<title>4-Eyes Fleet Dashboard</title>
<style>
  :root { --bg: #0b0e11; --surface: #15191f; --text: #e4e6ea; --accent: #4f9cf7; --green: #34d399; --amber: #fbbf24; --red: #f87171; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; max-width: 680px; margin:0 auto; padding: 16px; }
  h1 { color: var(--accent); font-size: 1.4rem; margin-bottom: 8px; }
  .section { background: var(--surface); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .label { color: #8b95a3; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .value { font-size: 2rem; font-weight: 600; color: var(--text); }
  .green { color: var(--green); }
  .amber { color: var(--amber); }
  .red { color: var(--red); }
  .refresh-btn { background: var(--surface); border: 1px solid #252b33; color: var(--accent); font-family: monospace; font-size: 0.72rem; padding: 6px 14px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .refresh-btn:active { background: #1c2128; }
  .spin { animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .url-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; word-break: break-all; }
  .url-link:hover { text-decoration: underline; }
  .dashboard-url { background: var(--surface); border-radius: 6px; padding: 12px; margin-bottom: 16px; border: 1px solid #252b33; }
</style>
</head>
<body>
  <h1>4-Eyes Fleet Dashboard</h1>
  <p style="color: #8b95a3; font-size: 0.72rem;">Last updated: 2026-05-23 12:00 CET</p>
  
  <div class="dashboard-url">
    <div class="label">Dashboard URL</div>
    <a href="https://dashboard.4-eyes.eu" class="url-link" target="_blank">https://dashboard.4-eyes.eu</a>
  </div>
  
  <div class="section">
    <div class="label">Cron Jobs</div>
    <div class="value green">0</div>
  </div>
  
  <div class="section">
    <div class="label">Eval Scenarios</div>
    <div class="value green">0</div>
  </div>
  
  <div class="section">
    <div class="label">Agent Freshness</div>
    <div class="value green">0 fresh</div>
    <div style="font-size: 0.72rem; color: #8b95a3; margin-top: 8px;">
      Stale: 0 | Critical: 0
    </div>
  </div>
  
  <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
    <span class="spin-icon">↻</span> Refresh Now
  </button>
  
  <script>
    function doRefresh() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spin');
      btn.disabled = true;
      location.reload();
    }
  </script>
</body>
</html>
