<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="refresh" content="300">
<title>4-Eyes Fleet Dashboard</title>
<style>
  :root { --bg: #1B2D4F; --surface: #22304D; --text: #FFFFFF; --accent: #E8A020; --green: #34D399; --amber: #E8A020; --red: #D95F4B; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; max-width: 680px; margin:0 auto; padding: 16px; }
  h1 { color: var(--accent); font-size: 1.4rem; margin-bottom: 8px; }
  .section { background: var(--surface); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .label { color: #A0AEC0; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .value { font-size: 2rem; font-weight: 600; color: var(--text); }
  .green { color: var(--green); }
  .amber { color: var(--amber); }
  .red { color: var(--red); }
</style>
</head>
<body>
  <h1>4-Eyes Fleet Dashboard</h1>
  <p style="color: #A0AEC0; font-size: 0.72rem;">Last updated: 2026-06-02 20:05 CET</p>

  <div class="section">
    <div class="label">Cron Jobs</div>
    <div class="value green">21</div>
    <div style="font-size: 0.72rem; color: #A0AEC0; margin-top: 8px;">
      Healthy: 18 | Failed: 2 | Stale: 1
    </div>
  </div>

  <div class="section">
    <div class="label">Eval Scenarios</div>
    <div class="value green">0</div>
  </div>

  <div class="section">
    <div class="label">Agent Freshness</div>
    <div class="value green">7 fresh</div>
    <div style="font-size: 0.72rem; color: #A0AEC0; margin-top: 8px;">
      Stale: 0 | Critical: 1
    </div>
  </div>

  <div class="section">
    <div class="label">Dashboard URL</div>
    <a href="https://dashboard.4-eyes.eu" style="color: var(--accent); text-decoration: none; font-size: 0.85rem; word-break: break-all;">https://dashboard.4-eyes.eu</a>
  </div>
</body>
</html>
