<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>ScienceBusiness.net Tracker</title>
    <style>
        :root {
            --bg: #0b0e11;
            --surface: #15191f;
            --text: #e4e6ea;
            --accent: #4f9cf7;
            --green: #34d399;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: var(--accent);
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .timestamp {
            color: #8b95a3;
            font-size: 0.75rem;
            margin-bottom: 24px;
        }
        .article {
            background: var(--surface);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .article-number {
            background: var(--accent);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .article-content {
            flex: 1;
        }
        .article-title {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            line-height: 1.4;
            display: block;
            margin-bottom: 6px;
        }
        .article-title:hover {
            color: var(--accent);
        }
        .article-desc {
            color: #8b95a3;
            font-size: 0.85rem;
            line-height: 1.5;
            margin: 0;
        }
        .refresh-btn {
            background: var(--surface);
            border: 1px solid #252b33;
            color: var(--accent);
            font-family: monospace;
            font-size: 0.75rem;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 16px;
        }
        .refresh-btn:hover {
            background: #1c2128;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8b95a3;
        }
    </style>
</head>
<body>
    <h1>🔬 ScienceBusiness.net Tracker</h1>
    <p class="timestamp">Last updated: 2026-06-29 06:45 CET</p>
    
    <div class="articles">
        <div class="empty-state"><p>⚠️ No articles found. Check API connectivity.</p></div>
    </div>
    
    <button class="refresh-btn" onclick="location.reload()">↻ Refresh Now</button>
    
    <script>
        setTimeout(() => location.reload(), 3600000);
    </script>
</body>
</html>
